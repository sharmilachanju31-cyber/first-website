<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Contact-Photography</title>
    <h1><b>📷IN THE FRAME</b></h1>
    <h2>Photography</h2>
    <link rel="stylesheet" href="style.css">
</head>
<body>

    <div class="contact-background">
        <div class="contact-overlay">
            <div class="contact-form-container">
                <h1>Contact Us</h1>
                <p>If you have a photography inquiry or just want to say hello, fill out the form below.
                    I'd love to hear from you! Fill out the form below to get in touch.</p>

                <form class="contact-form" action="sharmilachanju31@gmail.com" method="POST">
                    <input type="text" name="name" placeholder="Your Name" required>
                    <input type="email" name="email" placeholder="Your Email" required>
                    <input type="text" name="subject" placeholder="Subject">
                    <textarea name="message" rows="5" placeholder="Your Message" required></textarea>
                    <button type="submit">Send Message</button>
                </form>
            </div>
        </div>
    </div>

</body>
</html>
