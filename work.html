<!DOCTYPE html>

  <style>
    body {
      margin: 0;
      padding: 0;
      font-family: 'Segoe UI', sans-serif;
      background-color: #ffffff;
    }
    
    .masonry {
      column-count: 3;         /* Number of columns */
      column-gap: 24px;        /* Space between columns */
      padding: 40px;
    }

    .header-row {
      display: flex;
      justify-content: space-between;
      align-items: center;
      padding: 30px 50px;
      border-bottom: 1px solid #ccc;
    }

    .header-row h1 {
      font-family:'Lucida Sans';
      font-weight: 100;
      color:#3e5136;
      font-size: 40px;
      margin: 0;
    }

    .header-row nav a {
        
      font-family:sans-serif;
      margin-left: 30px;
      text-decoration: none;
      color:#3e5136;
      font-weight: 500;
    }

    .header-row nav a.active {
      color: #bb6b6b;
    }

    .masonry img {
      width: 100%;
      display: block;
      margin-bottom: 24px;
      border-radius: 12px;
      break-inside: avoid;     /* Prevents image from breaking between columns */
      box-shadow: 0 6px 14px rgba(0, 0, 0, 0.1);
      transition: transform 0.3s ease;
    }

    .masonry img:hover {
      transform: scale(1.02);
    }
    .img-container {
  position: relative;
  width: 100%;
  margin-bottom: 20px;
  overflow: hidden;
  border-radius: 10px;
}

.img-container img {
  width: 100%;
  display: block;
  border-radius: 10px;
}

.overlay {
  position: absolute;
  top: 0;
  left: 0;
  right: 0;
  bottom: 0;
  background-color: rgba(0,0,0,0.5);
  opacity: 0;
  display: flex;
  justify-content: center;
  align-items: center;
  border-radius: 10px;
  transition: opacity 0.4s ease;
}

.overlay p {
  color: #fff;
  font-size: 18px;
  font-family: 'Playfair Display', serif;
  text-align: center;
  padding: 10px;
}

.img-container:hover .overlay {
  opacity:3;
}
   
   .site-footer {
    text-align: center;
    padding: 20px;
    background-color:  #3e5136;
    color: #eee;
    margin-top: 0 50px;
}

    @media (max-width: 1024px) {
      .masonry {
        column-count: 2;
        padding: 30px;
      }
    }

    @media (max-width: 600px) {
      .masonry {
        column-count: 1;
        padding: 20px;
      }
    }
  </style>
